name: CI
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: golangci/golangci-lint-action@v9
  build:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - run: go build ./cmd/npm-binary-releaser/
      - run: go test -v ./...
  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Run semantic-release
        id: semrel
        run: |
          curl -fsSL https://registry.go-semantic-release.xyz/downloads/linux/amd64/semantic-release -o semantic-release
          chmod +x semantic-release
          ./semantic-release --version-file --changelog .generated-go-semantic-release-changelog.md --hooks goreleaser --allow-no-changes
          if [ -f .version ]; then
            echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"
            rm .version
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          go build ./cmd/npm-binary-releaser/
          ./npm-binary-releaser config
          ./npm-binary-releaser -r ${{steps.semrel.outputs.version}}
        if: steps.semrel.outputs.version != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
